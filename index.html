    <meta property="og:description" content="Se vores udvalg af kvalitetsbiler, eller få et uforpligtende tilbud på din bil med det samme." />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Titel og meta sættes dynamisk pr. brand via react-helmet-async -->
    <title>Autohuset</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
